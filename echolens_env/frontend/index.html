<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoLens 2.0 - Sign Language Translation</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-section">
                <div class="logo">
                    <svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="18" fill="none" stroke="#6366f1" stroke-width="2"/>
                        <path d="M20 8 L28 16 L20 24 L12 16 Z" fill="#6366f1"/>
                    </svg>
                </div>
                <h1>EchoLens 2.0</h1>
            </div>
            <nav class="nav">
                <button class="nav-btn active" data-page="translator">Translator</button>
                <button class="nav-btn" data-page="history">History</button>
                <button class="nav-btn" data-page="settings">Settings</button>
            </nav>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            
            <!-- Translator Page -->
            <div id="translator" class="page active">
                <div class="translator-container">
                    
                    <!-- Video Section -->
                    <div class="video-section">
                        <div class="video-wrapper">
                            <video id="webcam" autoplay playsinline muted></video>
                            <canvas id="canvas" style="display: none;"></canvas>
                            <div class="video-overlay">
                                <div class="pose-indicator">
                                    <svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                                        <circle cx="20" cy="8" r="3" fill="#10b981"/>
                                        <line x1="20" y1="11" x2="20" y2="20" stroke="#10b981" stroke-width="2"/>
                                        <line x1="20" y1="15" x2="12" y2="20" stroke="#10b981" stroke-width="2"/>
                                        <line x1="20" y1="15" x2="28" y2="20" stroke="#10b981" stroke-width="2"/>
                                        <line x1="20" y1="20" x2="12" y2="32" stroke="#10b981" stroke-width="2"/>
                                        <line x1="20" y1="20" x2="28" y2="32" stroke="#10b981" stroke-width="2"/>
                                    </svg>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Controls -->
                        <div class="controls">
                            <button id="startBtn" class="btn btn-primary">
                                <span>▶️</span> Start Recognizing
                            </button>
                            <button id="stopBtn" class="btn btn-danger" disabled>
                                <span>⏹️</span> Stop
                            </button>
                            <button id="resetBtn" class="btn btn-secondary">
                                <span>🔄</span> Reset
                            </button>
                        </div>
                    </div>

                    <!-- Results Section -->
                    <div class="results-section">
                        
                        <!-- Recognized Text Card -->
                        <div class="results-card">
                            <h2>Recognized Gesture</h2>
                            <div id="recognizedText" class="text-display">
                                <p class="placeholder">👁️ Waiting for input...</p>
                            </div>
                            <div class="confidence-bar">
                                <div id="confidenceBar" class="bar" style="width: 0%"></div>
                            </div>
                            <p id="confidenceText" class="confidence-text">Confidence: 0%</p>
                        </div>

                        <!-- Corrected Text Card -->
                        <div class="results-card">
                            <h2>Translated Text</h2>
                            <div id="correctedText" class="text-display">
                                <p class="placeholder">📝 Translation will appear here...</p>
                            </div>
                            <button id="copyBtn" class="btn btn-small" disabled>
                                📋 Copy to Clipboard
                            </button>
                        </div>

                        <!-- Buffer Progress -->
                        <div class="buffer-info">
                            <div class="buffer-header">
                                <span>Sequence Buffer</span>
                                <span id="bufferSize">0</span><span>/60</span>
                            </div>
                            <div class="progress-bar">
                                <div id="bufferProgress" class="progress" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- History Page -->
            <div id="history" class="page">
                <div class="history-container">
                    <h2>Translation History</h2>
                    <div id="historyList" class="history-list">
                        <p class="placeholder">📋 No translations yet</p>
                    </div>
                </div>
            </div>

            <!-- Settings Page -->
            <div id="settings" class="page">
                <div class="settings-container">
                    <h2>⚙️ Settings</h2>
                    <div class="settings-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="autoCorrect" checked>
                            <span>Auto-correct translations</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="saveHistory" checked>
                            <span>Save translation history</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="soundEnabled" checked>
                            <span>Enable notification sounds</span>
                        </label>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="status">
                <span id="statusIndicator" class="status-dot offline"></span>
                <span id="statusText">Disconnected</span>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="js/api-client.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
